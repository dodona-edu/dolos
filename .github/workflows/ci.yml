name: Continuous Integration

on: [push]

jobs:
  prepare-yarn-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["12", "14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}
      - name: Cache Yarn dependencies
        uses: actions/cache@v2
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-node_modules-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-node_modules-
      - name: Yarn install
        run: |
          yarn install

  test-cli:
    name: Test CLI with Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: prepare-yarn-cache
    strategy:
      matrix:
        node: ["12", "14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}
      - name: Restore cache
        uses: actions/cache@v2
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-node_modules-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
      - name: Build and test
        run: |
          cd cli/
          yarn build
          yarn test --verbose

  lint-cli:
    name: Lint CLI
    runs-on: ubuntu-latest
    needs: prepare-yarn-cache
    strategy:
      matrix:
        node: ["14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}
      - name: Restore cache
        uses: actions/cache@v2
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-node_modules-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
      - name: Yarn lint
        run: |
          cd cli/
          yarn lint

  build-web:
    name: Build WEB with Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: prepare-yarn-cache
    strategy:
      matrix:
        node: ["12", "14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}
      - name: Restore cache
        uses: actions/cache@v2
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-node_modules-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
      - name: Yarn build
        run: |
          cd web/
          yarn build

  lint-web:
    name: Lint WEB
    runs-on: ubuntu-latest
    needs: prepare-yarn-cache
    strategy:
      matrix:
        node: ["14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node }}
      - name: Restore cache
        uses: actions/cache@v2
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node }}-node_modules-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
      - name: Yarn lint
        run: |
          cd web/
          yarn lint
